services:
  agent:
    build:
      context: ./docker
    image: yolo:local
    volumes:
      - ${WORKSPACE:?set WORKSPACE=/path/to/project}:/workspace
    environment:
      - ANTHROPIC_API_KEY
      - GITHUB_TOKEN=${GITHUB_TOKEN:?GITHUB_TOKEN must be set}
      - GIT_EMAIL
      - GIT_NAME
    working_dir: /workspace
    stdin_open: true
    tty: true
